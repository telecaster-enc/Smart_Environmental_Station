[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
lib_deps = 
	esp32async/ESPAsyncWebServer@^3.11.2
	esp32async/AsyncTCP@^3.4.10
	adafruit/DHT sensor library@^1.4.7
	bblanchon/ArduinoJson@^7.2.2
